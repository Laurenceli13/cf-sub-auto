name: update-subscription

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run selection
        run: python scripts/select_best.py

      - name: Build subscription
        env:
          SUBSCRIPTION_TOKEN: ${{ secrets.SUBSCRIPTION_TOKEN }}
        run: python scripts/build_subscription.py

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nodes/selected.json public/sub.txt
          git diff --cached --quiet || git commit -m "chore: refresh best nodes and subscription"
          git push
