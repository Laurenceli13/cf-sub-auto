name: update-subscription

on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch free subscriptions
        run: python scripts/fetch_free_subscriptions.py

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/sub.txt public/sub_raw.txt public/sub_v2ray.txt public/sub_v2ray_raw.txt
          git diff --cached --quiet || git commit -m "chore: refresh free subscription nodes"
          git push
