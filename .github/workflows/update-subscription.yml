name: update-subscription

on:
  schedule:
    - cron: "27 17 * * *"  # Daily at 17:27 UTC (01:27 Beijing time)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch free subscriptions
        run: python scripts/fetch_free_subscriptions.py

      - name: Speed test nodes
        run: python scripts/speed_test.py
        env:
          NOTIFY_URL: ${{ secrets.NOTIFY_URL }}
          ALERT_THRESHOLD: ${{ secrets.ALERT_THRESHOLD || '30' }}

      - name: Build Clash/Sing-box formats
        run: python scripts/build_clash_singbox.py

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/
          git diff --cached --quiet || git commit -m "chore: refresh subscription nodes"
          git push
